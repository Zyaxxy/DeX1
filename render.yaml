services:
  - type: worker
    name: dexi-keeper
    env: node
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter dexi-keeper start
    envVars:
      - key: RPC_URL
        value: https://api.devnet.solana.com
      - key: KEEPER_PRIVATE_KEY
        sync: false
      - key: TXLINE_JWT
        sync: false
      - key: TXLINE_API_TOKEN
        sync: false
