name: Trigger Dexi Keeper Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger-keeper:
    runs-on: ubuntu-latest
    steps:
      - name: Send trigger request to Vercel Keeper API
        run: |
          if [ -z "${{ secrets.KEEPER_URL }}" ]; then
            echo "Error: KEEPER_URL secret is not set in GitHub repository secrets. E.g. https://your-app.vercel.app"
            exit 1
          fi
          
          echo "Triggering Vercel Keeper API at ${{ secrets.KEEPER_URL }}/api/cron/keeper ..."
          
          curl -s -X POST "${{ secrets.KEEPER_URL }}/api/cron/keeper" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body || exit 1
